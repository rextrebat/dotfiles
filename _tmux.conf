# =====================================================
# TMUX Configuration - Modern Setup
# =====================================================

# Basic Settings
# =====================================================
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g history-limit 10000
set -g buffer-limit 20
set -sg escape-time 0
set -g display-time 1500
set -g remain-on-exit off
set -g repeat-time 300
setw -g allow-rename off
setw -g automatic-rename off
setw -g aggressive-resize on

# Change prefix to Ctrl-a (more comfortable than Ctrl-b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Start indexing from 1
set -g base-index 1
setw -g pane-base-index 1

# Automatically renumber windows when one is closed
set -g renumber-windows on

# Enable mouse support
set -g mouse on

# Vi mode
set -g status-keys emacs
set -g mode-keys vi

# Key Bindings
# =====================================================

# Reload tmux config with 'r'
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"

# New window and retain cwd
bind c new-window -c "#{pane_current_path}"

# Prompt to rename window right after it's created
set-hook -g after-new-window 'command-prompt -I "#{window_name}" "rename-window '%%'"'

# Rename session and window
bind R command-prompt -I "#{session_name}" "rename-session '%%'"
bind W command-prompt -I "#{window_name}" "rename-window '%%'"

# Split panes using | and - and retain cwd
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane navigation (vim-like)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Window navigation
bind -n M-H previous-window
bind -n M-L next-window

# Pane resizing
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# Copy mode improvements
bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel
bind -T copy-mode-vi H send-keys -X start-of-line
bind -T copy-mode-vi L send-keys -X end-of-line

# Copy to system clipboard (requires xclip on Linux)
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"

# Appearance & Status Bar
# =====================================================

# Colors and styling
set -g status-bg '#2E3440'
set -g status-fg '#D8DEE9'
set -g status-left-length 40
set -g status-right-length 100
set -g status-interval 1

# Window status format
setw -g window-status-current-style 'fg=#2E3440 bg=#88C0D0 bold'
setw -g window-status-current-format ' #I #W #F '
setw -g window-status-style 'fg=#D8DEE9 bg=#4C566A'
setw -g window-status-format ' #I #W #F '

# Pane borders
set -g pane-border-style 'fg=#4C566A'
set -g pane-active-border-style 'fg=#88C0D0'

# Command line/message text
set -g message-style 'fg=#2E3440 bg=#EBCB8B bold'

# Status left: session name
set -g status-left '#[fg=#2E3440,bg=#88C0D0,bold] #S #[fg=#88C0D0,bg=#2E3440,nobold]'

# Status right: system info and time
set -g status-right '#[fg=#4C566A,bg=#2E3440]#[fg=#D8DEE9,bg=#4C566A] %Y-%m-%d #[fg=#D8DEE9,bg=#4C566A]#[fg=#2E3440,bg=#D8DEE9,bold] %H:%M:%S '

# Center window list
set -g status-justify centre

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
set -g bell-action none

# Plugin Configuration
# =====================================================

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

# Plugin settings
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-save-shell-history 'on'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

set -g @yank_selection_mouse 'clipboard'

set -g @prefix_highlight_fg '#2E3440'
set -g @prefix_highlight_bg '#EBCB8B'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr 'fg=#2E3440,bg=#A3BE8C,bold'

# Initialize TMUX plugin manager (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'