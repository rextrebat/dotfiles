# Starship prompt configuration
# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Use custom format
format = """
[╭─](bold blue)$username$hostname$directory$git_branch$git_status$python$nodejs$golang$rust$java$docker_context
[╰─$character](bold blue)"""

# Disable the blank line at the start of the prompt
add_newline = false

# You can also replace your username with a neat symbol like   or disable it
[username]
show_always = true
style_user = "bold yellow"
style_root = "bold red"
format = '[$user]($style) '
disabled = false

[hostname]
ssh_only = false
format = 'on [$hostname](bold purple) '
disabled = false

[directory]
style = "bold cyan"
read_only = " 🔒"
truncation_length = 4
truncate_to_repo = true

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[git_branch]
symbol = "🌱 "
truncation_length = 15
style = "bold green"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold red"
conflicted = "🏳"
up_to_date = "✓"
untracked = "🤷"
ahead = "⇡${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
behind = "⇣${count}"
stashed = "📦"
modified = "📝"
staged = '[++\($count\)](green)'
renamed = "👅"
deleted = "🗑"

[python]
symbol = "🐍 "
python_binary = ["./venv/bin/python", "python", "python3", "python2"]
format = 'via [${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'

[nodejs]
symbol = "⬢ "
format = 'via [${symbol}(${version})]($style) '

[golang]
symbol = "🐹 "
format = 'via [${symbol}(${version})]($style) '

[rust]
symbol = "🦀 "
format = 'via [${symbol}(${version})]($style) '

[java]
symbol = "☕ "
format = 'via [${symbol}(${version})]($style) '

[docker_context]
symbol = "🐳 "
format = 'via [${symbol}$context]($style) '

[cmd_duration]
min_time = 500
format = 'took [$duration](bold yellow)'

[memory_usage]
disabled = false
threshold = 70
symbol = "🐏 "
format = 'via [${symbol}${ram}]($style) '

[time]
disabled = false
format = '🕙[$time]($style) '
time_format = "%T"
utc_time_offset = "local"

[battery]
full_symbol = "🔋"
charging_symbol = "⚡️"
discharging_symbol = "💀"

[[battery.display]]
threshold = 15
style = "bold red"

[[battery.display]]
threshold = 50
style = "bold yellow"

[package]
disabled = false
symbol = "📦 "
format = 'via [${symbol}${version}]($style) '